name: publish

# Build and publish swarm-cc to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token or password stored anywhere.
# Same convention as agent-pd and shotlist. Register the trusted publisher on PyPI with:
#   PyPI Project Name: swarm-cc
#   Owner:             varmabudharaju
#   Repository name:   swarm
#   Workflow name:     publish.yml
#   Environment name:  pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install -e . pytest
      - run: python -m pytest tests/ -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: wheel is self-contained (non-editable lifecycle smoke)
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          T=$(mktemp -d)
          cd /tmp
          /tmp/venv/bin/swarm install --settings "$T/settings.json" --claude-dir "$T/claude"
          test -f "$T/claude/workflows/swarm-run.js"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # configure this environment in the repo settings
    permissions:
      id-token: write          # required for OIDC / Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
