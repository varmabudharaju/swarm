name: release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build
      - name: sanity - wheel installs and runs non-editable
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          T=$(mktemp -d)
          cd /tmp
          /tmp/venv/bin/swarm install --settings "$T/settings.json" --claude-dir "$T/claude"
          test -f "$T/claude/workflows/swarm-run.js"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    # Trusted publishing (OIDC): register this repo + workflow as a publisher
    # for the ctx-swarm project at https://pypi.org/manage/account/publishing/
    # (no API token stored in the repo).
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
